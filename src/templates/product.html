<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>   EuroFit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --white:#FAFAF8;
  --surface:#F3F1EC;
  --surface2:#E8E5DE;
  --blue:#0B38D4;
  --blue-light:#EEF2FF;
  --blue-mid:#C7D3FB;
  --ink:#111110;
  --ink2:#4A4845;
  --ink3:#8A8783;
  --border:#DDD9D2;
  --border2:#CCCAC4;
  --green:#1A7A4A;
  --green-bg:#EAF5EE;
  --amber:#B45309;
  --amber-bg:#FEF3C7;
  --red:#D63B1F;
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--white);color:var(--ink);overflow-x:hidden}
.cur,.cur-ring{position:fixed;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%)}
.cur{width:8px;height:8px;background:var(--blue);transition:transform .15s,background .2s}
.cur-ring{width:36px;height:36px;border:1.5px solid var(--blue);opacity:.5;transition:left .07s ease,top .07s ease,width .25s,height .25s}

/*  NAV  */
nav{position:fixed;top:0;left:0;right:0;z-index:500;height:64px;display:flex;align-items:center;padding:0 48px;background:rgba(250,250,248,.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.nav-inner{width:100%;max-width:1280px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;letter-spacing:-.5px;color:var(--ink);text-decoration:none}
.logo em{font-style:normal;color:var(--blue)}
.nav-links{display:flex;gap:36px;list-style:none}
.nav-links a{font-size:13px;font-weight:500;color:var(--ink2);text-decoration:none;transition:color .2s}
.nav-links a:hover{color:var(--blue)}
.nav-right{display:flex;align-items:center;gap:16px}
.btn-ghost{font-size:13px;font-weight:500;color:var(--ink);background:none;border:1.5px solid var(--border2);padding:8px 20px;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-block;font-family:'DM Sans',sans-serif}
.btn-ghost:hover{border-color:var(--blue);color:var(--blue)}
.btn-nav-primary{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--white);background:var(--blue);border:none;padding:10px 24px;cursor:pointer;transition:background .2s}
.btn-nav-primary:hover{background:#0A2FB0}

/*  BREADCRUMB  */
.breadcrumb-wrap{padding-top:64px;background:var(--surface);border-bottom:1px solid var(--border)}
.breadcrumb{max-width:1280px;margin:0 auto;padding:14px 48px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink3)}
.breadcrumb a{color:var(--ink3);text-decoration:none;transition:color .2s}
.breadcrumb a:hover{color:var(--blue)}
.breadcrumb-sep{opacity:.4;font-size:10px}
.breadcrumb-current{color:var(--ink);font-weight:500}

/*  PRODUCT HERO  */
.product-hero{max-width:1280px;margin:0 auto;padding:48px 48px 0;display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:start}

/* Left  Visual */
.vis-panel{position:sticky;top:80px}
.vis-main{background:var(--surface);border:1.5px solid var(--border);position:relative;overflow:hidden;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center}
.vis-main-inner{width:80%;height:80%;display:flex;align-items:center;justify-content:center;transition:transform .4s ease}
.vis-main:hover .vis-main-inner{transform:scale(1.04)}
.vis-badge-stock{position:absolute;top:16px;left:16px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:6px 12px}
.vis-badge-stock.in{background:var(--green-bg);color:var(--green)}
.vis-badge-stock.out{background:var(--amber-bg);color:var(--amber)}
.vis-rotate-hint{position:absolute;bottom:16px;right:16px;display:flex;align-items:center;gap:6px;font-size:10px;color:var(--ink3);opacity:.6}
.vis-thumbs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}
.vis-thumb{aspect-ratio:1/1;background:var(--surface);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color .2s;overflow:hidden}
.vis-thumb.active{border-color:var(--blue)}
.vis-thumb:hover{border-color:var(--blue-mid)}
.vis-thumb svg{width:65%;height:65%;opacity:.6;transition:opacity .2s}
.vis-thumb.active svg,.vis-thumb:hover svg{opacity:1}
/* Angle label inside thumb */
.vis-thumb-label{font-size:9px;font-weight:600;color:var(--ink3);font-family:'Syne',sans-serif;letter-spacing:.5px}

/* Right  Info panel */
.info-panel{padding-bottom:80px}
.product-eyebrow{display:flex;align-items:center;gap:10px;font-size:11px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--blue);margin-bottom:16px}
.product-eyebrow::before{content:'';width:20px;height:2px;background:var(--blue)}
.product-title{font-family:'Syne',sans-serif;font-size:clamp(32px,3.5vw,52px);font-weight:800;letter-spacing:-1.5px;line-height:1;margin-bottom:12px;opacity:0;transform:translateY(16px);animation:fu .6s .1s ease forwards}
.product-subtitle{font-size:15px;color:var(--ink2);line-height:1.75;font-weight:300;margin-bottom:32px;opacity:0;animation:fu .6s .2s ease forwards}
/* Stock + article row */
.product-meta-row{display:flex;align-items:center;gap:20px;padding:14px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:28px;opacity:0;animation:fu .6s .25s ease forwards}
.stock-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.stock-dot.in{background:var(--green)}
.stock-dot.out{background:var(--amber)}
.stock-label{font-size:13px;font-weight:500}
.stock-label.in{color:var(--green)}
.stock-label.out{color:var(--amber)}
.meta-sep{width:1px;height:20px;background:var(--border)}
.article-num{font-size:12px;color:var(--ink3);font-family:monospace}
.lead-time{font-size:12px;color:var(--ink3)}

/* Quick specs strip */
.quick-specs{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1.5px solid var(--border);margin-bottom:28px;opacity:0;animation:fu .6s .3s ease forwards}
.qs-item{padding:16px;text-align:center;position:relative}
.qs-item:not(:last-child)::after{content:'';position:absolute;right:0;top:16%;height:68%;width:1px;background:var(--border)}
.qs-val{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--ink);letter-spacing:-.5px;line-height:1}
.qs-key{font-size:10px;font-weight:500;color:var(--ink3);letter-spacing:1.5px;text-transform:uppercase;margin-top:5px}

/* Tabs */
.tabs-wrap{opacity:0;animation:fu .6s .35s ease forwards}
.tabs-nav{display:flex;border-bottom:1.5px solid var(--border);margin-bottom:28px;gap:0}
.tab-btn{padding:12px 0;margin-right:28px;font-size:13px;font-weight:500;color:var(--ink3);background:none;border:none;cursor:pointer;position:relative;transition:color .2s;white-space:nowrap;font-family:'DM Sans',sans-serif}
.tab-btn::after{content:'';position:absolute;bottom:-1.5px;left:0;width:0;height:2px;background:var(--blue);transition:width .3s}
.tab-btn.active{color:var(--blue)}
.tab-btn.active::after{width:100%}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* Tab:  */
.description-text{font-size:14px;line-height:1.85;color:var(--ink2);font-weight:300}
.description-text p{margin-bottom:14px}
.description-text p:last-child{margin-bottom:0}
.desc-highlight{background:var(--blue-light);border-left:3px solid var(--blue);padding:14px 18px;margin:20px 0;font-size:13px;font-weight:400;color:var(--ink);line-height:1.7}

/* Tab:  */
.specs-table{width:100%;border-collapse:collapse}
.specs-table tbody tr{border-bottom:1px solid var(--border);transition:background .2s}
.specs-table tbody tr:hover{background:var(--blue-light)}
.specs-table td{padding:11px 0;font-size:13px;vertical-align:top}
.specs-table td:first-child{color:var(--ink3);font-weight:400;width:50%;padding-right:20px}
.specs-table td:last-child{font-weight:500;color:var(--ink)}
.specs-group-header{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--blue);padding:16px 0 8px;border-bottom:1px solid var(--blue-mid)}
.specs-group-header td{color:var(--blue)!important;font-size:10px!important;letter-spacing:2px!important;text-transform:uppercase}

/* Tab:  */
.docs-list{display:flex;flex-direction:column;gap:10px}
.doc-item{display:flex;align-items:center;gap:14px;padding:14px 16px;border:1.5px solid var(--border);transition:border-color .2s,background .2s;cursor:pointer}
.doc-item:hover{border-color:var(--blue);background:var(--blue-light)}
.doc-icon{width:40px;height:40px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.doc-icon svg{width:20px;height:20px;stroke:var(--blue)}
.doc-info{flex:1}
.doc-name{font-size:13px;font-weight:500;margin-bottom:3px}
.doc-meta{font-size:11px;color:var(--ink3)}
.doc-size{font-size:11px;color:var(--ink3);margin-left:auto;font-family:monospace}
.doc-dl{width:32px;height:32px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s,border-color .2s}
.doc-item:hover .doc-dl{background:var(--blue);border-color:var(--blue)}
.doc-item:hover .doc-dl svg{stroke:white}

/* Tab:  */
.weld-steps{display:flex;flex-direction:column;gap:12px}
.weld-step{display:flex;gap:16px;align-items:flex-start}
.weld-num{width:32px;height:32px;background:var(--ink);color:white;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;flex-shrink:0}
.weld-title{font-size:13px;font-weight:600;margin-bottom:4px}
.weld-desc{font-size:12px;color:var(--ink2);line-height:1.6;font-weight:300}
.weld-params{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px;padding-top:20px;border-top:1px solid var(--border)}
.wparam{background:var(--surface);border:1px solid var(--border);padding:14px}
.wparam-val{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--blue);letter-spacing:-.5px}
.wparam-key{font-size:10px;color:var(--ink3);letter-spacing:1px;text-transform:uppercase;margin-top:4px}

/* CTA area */
.cta-area{background:var(--surface);border:1.5px solid var(--border);padding:24px;margin-top:28px;opacity:0;animation:fu .6s .4s ease forwards}
.cta-area-title{font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--ink3);margin-bottom:16px}
.cta-btns-row{display:flex;flex-direction:column;gap:10px}
.btn-cta-primary{width:100%;padding:15px;background:var(--blue);color:white;border:none;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;letter-spacing:-.3px;cursor:pointer;transition:background .2s,transform .15s;display:flex;align-items:center;justify-content:center;gap:10px}
.btn-cta-primary:hover{background:#0A2FB0;transform:translateY(-1px)}
.btn-cta-secondary{width:100%;padding:13px;background:none;border:1.5px solid var(--border2);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--ink)}
.btn-cta-secondary:hover{border-color:var(--ink)}
.cta-trust{display:flex;gap:16px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border);flex-wrap:wrap}
.trust-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ink3)}
.trust-item svg{width:14px;height:14px;stroke:var(--green);flex-shrink:0}

/*  PRODUCT TABS SECTION  */
.product-details-section{max-width:1280px;margin:0 auto;padding:0 48px 80px}

/*  SPECS TABLE large  */
.specs-full{margin-top:0}

/*  RELATED PRODUCTS  */
.related-section{background:var(--surface);border-top:1px solid var(--border)}
.related-inner{max-width:1280px;margin:0 auto;padding:64px 48px}
.related-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:36px}
.sec-tag{display:flex;align-items:center;gap:10px;font-size:11px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--blue);margin-bottom:12px}
.sec-tag::before{content:'';width:20px;height:2px;background:var(--blue)}
h2.sec-title{font-family:'Syne',sans-serif;font-size:clamp(28px,3vw,42px);font-weight:800;letter-spacing:-1px;line-height:1}
.related-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.rel-card{border:1.5px solid var(--border);background:var(--white);overflow:hidden;cursor:pointer;transition:border-color .3s,transform .3s,box-shadow .3s;text-decoration:none;color:inherit;display:block}
.rel-card:hover{border-color:var(--blue-mid);transform:translateY(-3px);box-shadow:0 8px 28px rgba(11,56,212,.07)}
.rel-img{width:100%;aspect-ratio:4/3;background:var(--surface);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.rel-img svg{width:65%;height:65%;transition:transform .3s}
.rel-card:hover .rel-img svg{transform:scale(1.06)}
.rel-cat{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--blue);padding:14px 14px 0}
.rel-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;letter-spacing:-.3px;padding:6px 14px 10px;line-height:1.2}
.rel-specs{display:flex;flex-wrap:wrap;gap:4px;padding:0 14px 14px}
.rel-spec{font-size:9px;font-weight:600;letter-spacing:.5px;padding:3px 7px;background:var(--surface);color:var(--ink2);border:1px solid var(--border)}

/*  STICKY BOTTOM BAR (mobile)  */
.sticky-bar{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);padding:12px 20px;gap:10px;z-index:400}
@media(max-width:960px){
  .sticky-bar{display:flex}
  .product-hero{grid-template-columns:1fr;gap:32px;padding:24px 24px 0}
  .vis-panel{position:static}
  .related-grid{grid-template-columns:repeat(2,1fr)}
  .related-inner,.product-details-section{padding-left:24px;padding-right:24px}
  nav{padding:0 24px}
  .nav-links{display:none}
  .breadcrumb{padding:14px 24px}
  .quick-specs{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:640px){
  .related-grid{grid-template-columns:1fr 1fr}
  .vis-thumbs{grid-template-columns:repeat(4,1fr)}
  .weld-params{grid-template-columns:1fr 1fr}
}

@keyframes fu{to{opacity:1;transform:translateY(0)}}
@keyframes drawLine{to{stroke-dashoffset:0}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.12)}}

.reveal{opacity:0;transform:translateY(20px);transition:opacity .65s ease,transform .65s ease}
.reveal.on{opacity:1;transform:translateY(0)}
</style>
</head>

<div class="cur" id="cur"></div>
<div class="cur-ring" id="cur-ring"></div>

<!-- NAV -->
<nav>
  <div class="nav-inner">
    <a href="index.html" class="logo">Euro<em>Fit</em></a>
    <ul class="nav-links">
      <li><a href="index.html#products"></a></li>

<!-- BREADCRUMB -->
<div class="breadcrumb-wrap">

    <span class="breadcrumb-sep"></span>

<!-- PRODUCT HERO -->

      </div>
    </div>
    <div class="vis-thumbs" id="vis-thumbs">
      <!-- 4 thumbs injected by JS -->

         DXF

    <div class="product-meta-row">
      <div class="stock-dot in" id="meta-dot"></div>

      <div class="meta-sep"></div>

      <div class="qs-item">

        <div class="qs-key">DN, </div>
      </div>
      <div class="qs-item">
        <div class="qs-val" id="qs-pn">PN 16</div>
        <div class="qs-key"></div>
      </div>

        <div class="qs-val" id="qs-l">360</div>

      </div>

    <!-- Tabs -->

      </div>

      <div class="tab-panel active" id="tab-desc">
        <div class="description-text" id="desc-text">

        </div>
      </div>

      <!-- Tab:  -->
      <div class="tab-panel" id="tab-specs">
        <table class="specs-table" id="specs-table">
          <!-- Injected by JS -->
        </table>
      </div>

      <!-- Tab:  -->
      <div class="tab-panel" id="tab-docs">
        <div class="docs-list" id="docs-list">
          <!-- Injected by JS -->
        </div>
      </div>

      <!-- Tab:   -->
      <div class="tab-panel" id="tab-weld">
        <div class="weld-steps" id="weld-steps">
          <!-- Injected by JS -->
        </div>
      </div>
    </div>

    <!-- CTA -->
    <div class="cta-area">
      <div class="cta-area-title">  </div>
      <div class="cta-btns-row">
        <button class="btn-cta-primary" id="cta-main-btn">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M15.75 11.25a1.5 1.5 0 01-1.5 1.5H4.5l-3 3V3.75a1.5 1.5 0 011.5-1.5h11.25a1.5 1.5 0 011.5 1.5v7.5z"/></svg>
             24 
        </button>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <button class="btn-cta-secondary">

 */
function getProductId() {
  const p = new URLSearchParams(window.location.search);
  const id = parseInt(p.get('id') || '0');
  return PRODUCTS.find(x=>x.id===id) || PRODUCTS[0];
}

function renderProduct(p) {
  // Meta
  document.title = `${p.name}  EuroFit`;
  document.getElementById('bc-cat').textContent = p.cat;
  document.getElementById('bc-name').textContent = p.name;
  document.getElementById('prod-eyebrow').textContent = p.cat;
  document.getElementById('prod-title').textContent = p.name;
  document.getElementById('prod-subtitle').textContent = p.subtitle;
  document.getElementById('blueprint-title').textContent = p.blueprintTitle;
  document.getElementById('blueprint-sub').textContent = p.blueprintSub;

  // Stock
  const dot = document.getElementById('meta-dot');
  const stockL = document.getElementById('meta-stock');
  const visBadge = document.getElementById('vis-stock-badge');
  if(p.stock==='in'){
    dot.className='stock-dot in'; stockL.className='stock-label in';
    visBadge.className='vis-badge-stock in';
  } else {
    dot.className='stock-dot out'; stockL.className='stock-label out';
    visBadge.className='vis-badge-stock out';
  }
  stockL.textContent = p.stockLabel;
  document.getElementById('meta-art').textContent = ': '+p.article;
  document.getElementById('meta-lead').textContent = p.leadTime;

  // Quick specs
  document.getElementById('qs-dn').textContent = p.qs.dn;
  document.getElementById('qs-pn').textContent = p.qs.pn;
  document.getElementById('qs-l').textContent = p.qs.l;
  document.getElementById('qs-mat').textContent = p.qs.mat;

  // Main SVG
  document.getElementById('vis-svg-wrap').innerHTML = drawingMain(p.id, 400, 400);

  // Thumbs
  const thumbsWrap = document.getElementById('vis-thumbs');
  thumbsWrap.innerHTML = p.thumbAngles.map((label, i) => `
    <div class="vis-thumb ${i===0?'active':''}" onclick="selectThumb(this, ${p.id}, ${i})">
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px">
        ${drawingMain(p.id,80,80)}
        <span class="vis-thumb-label">${label}</span>
      </div>
    </div>
  `).join('');

  // Description
  document.getElementById('desc-text').innerHTML = p.description;

  // Specs table
  let specHtml = '<tbody>';
  p.specs.forEach(r => {
    if(r.group) {
      specHtml += `<tr class="specs-group-header"><td colspan="2">${r.group}</td></tr>`;
    } else {
      specHtml += `<tr><td>${r.k}</td><td>${r.v}</td></tr>`;
    }
  });
  specHtml += '</tbody>';
  document.getElementById('specs-table').innerHTML = specHtml;

  // Docs
  const docIcons = {PDF:'<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 2h8l4 4v12H4V2z"/><path d="M12 2v4h4"/><line x1="7" y1="10" x2="13" y2="10"/><line x1="7" y1="13" x2="11" y2="13"/></svg>', DXF:'<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="14" height="14"/><line x1="7" y1="7" x2="13" y2="13"/><line x1="13" y1="7" x2="7" y2="13"/></svg>'};
  document.getElementById('docs-list').innerHTML = p.docs.map(d=>`
    <div class="doc-item">
      <div class="doc-icon">${docIcons[d.type]||docIcons.PDF}</div>
      <div class="doc-info">
        <div class="doc-name">${d.name}</div>
        <div class="doc-meta">${d.desc}</div>
      </div>
      <span class="doc-size">${d.size}</span>
      <div class="doc-dl">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M7 1v8M4 6l3 3 3-3M2 11v1a1 1 0 001 1h8a1 1 0 001-1v-1"/></svg>
      </div>
    </div>
  `).join('');

  // Weld params
  const wp = p.weldParams;
  document.getElementById('weld-steps').innerHTML = `
    <div class="weld-step">
      <div class="weld-num">1</div>
      <div><div class="weld-title"> </div>
      <div class="weld-desc">         + 10 .       (0.2 ).       .</div></div>
    </div>
    <div class="weld-step">
      <div class="weld-num">2</div>
      <div><div class="weld-title">  </div>
      <div class="weld-desc">     .      ,  .         .</div></div>
    </div>
    <div class="weld-step">
      <div class="weld-num">3</div>
      <div><div class="weld-title"></div>
      <div class="weld-desc">   EF-.  -        .   .      .</div></div>
    </div>
    <div class="weld-step">
      <div class="weld-num">4</div>
      <div><div class="weld-title">  </div>
      <div class="weld-desc">       .     ( ).       .</div></div>
    </div>
    <div class="weld-params">
      <div class="wparam"><div class="wparam-val">${wp.voltage}</div><div class="wparam-key"></div></div>
      <div class="wparam"><div class="wparam-val">${wp.time}</div><div class="wparam-key"> </div></div>
      <div class="wparam"><div class="wparam-val">${wp.coolDown}</div><div class="wparam-key"></div></div>
      <div class="wparam"><div class="wparam-val">${wp.tempMin}</div><div class="wparam-key">. </div></div>
    </div>`;

  // Related products
  const relGrid = document.getElementById('related-grid');
  relGrid.innerHTML = p.relatedIds.slice(0,4).map(rid => {
    const rp = PRODUCTS.find(x=>x.id===rid);
    if(!rp) return '';
    const stockBadge = rp.stock==='in' ? `<div style="position:absolute;top:10px;left:10px;font-size:9px;font-weight:700;letter-spacing:1px;padding:3px 8px;background:var(--green-bg);color:var(--green)"> </div>` : '';
    return `<a href="product.html?id=${rp.id}" class="rel-card">
      <div class="rel-img" style="position:relative">
        ${drawingMain(rp.id,200,150)}
        ${stockBadge}
      </div>
      <div class="rel-cat">${rp.cat}</div>
      <div class="rel-name">${rp.name}</div>
      <div class="rel-specs">
        <span class="rel-spec">DN ${rp.qs.dn}</span>
        <span class="rel-spec">${rp.qs.pn}</span>
        <span class="rel-spec">${rp.qs.mat}</span>
      </div>
    </a>`;
  }).join('');
}

function selectThumb(el, productId, angleIndex) {
  document.querySelectorAll('.vis-thumb').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  // Animate the main SVG (slight variation per angle)
  const wrap = document.getElementById('vis-svg-wrap');
  wrap.style.opacity = '0';
  wrap.style.transform = 'scale(.96)';
  setTimeout(() => {
    wrap.style.transition = 'opacity .3s, transform .3s';
    wrap.style.opacity = '1';
    wrap.style.transform = 'scale(1)';
  }, 150);
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}

// Cursor
const cur=document.getElementById('cur'),ring=document.getElementById('cur-ring');
document.addEventListener('mousemove',e=>{
  cur.style.cssText=`left:${e.clientX}px;top:${e.clientY}px`;
  ring.style.cssText=`left:${e.clientX}px;top:${e.clientY}px`;
});
const hoverEls = () => document.querySelectorAll('a,button,.vis-thumb,.rel-card,.doc-item,.tab-btn,.pstep');
setTimeout(()=>{
  hoverEls().forEach(el=>{
    el.addEventListener('mouseenter',()=>{cur.style.transform='translate(-50%,-50%) scale(2.8)';ring.style.width='52px';ring.style.height='52px';ring.style.opacity='.2'});
    el.addEventListener('mouseleave',()=>{cur.style.transform='';ring.style.width='36px';ring.style.height='36px';ring.style.opacity='.5'});
  });
},300);

// Reveal
const ro=new IntersectionObserver(ents=>{ents.forEach(e=>{if(e.isIntersecting){e.target.classList.add('on');ro.unobserve(e.target);}});},{threshold:.1});
document.querySelectorAll('.reveal').forEach(el=>ro.observe(el));
</script>
